name: Latest commit SVG

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/gen_latest.py"
      - "scripts/svg_common.py"
      - ".github/workflows/latest.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate LATEST SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/gen_latest.py --theme light > assets/latest-light.svg
          python3 scripts/gen_latest.py --theme dark  > assets/latest-dark.svg

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/latest-light.svg assets/latest-dark.svg
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore(profile): refresh LATEST commit SVG"
            git push
          fi
